name: Atualizar dados do Odoo

# Quando rodar:
on:
  schedule:
    - cron: "*/30 * * * *"   # a cada 30 minutos (UTC)
  workflow_dispatch: {}       # botão para rodar manualmente na aba Actions
  push:
    branches: [ main ]        # roda também a cada push na main (útil no 1º teste)
    paths:
      - "scripts/**"
      - ".github/workflows/**"

permissions:
  contents: write             # necessário para commitar o data.json

concurrency:
  group: atualizar-dados
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Buscar dados no Odoo
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
        run: python scripts/fetch_odoo.py

      - name: Commitar data.json se mudou
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "Sem alterações nos dados."
            exit 0
          fi
          for tentativa in 1 2 3 4 5; do
            git fetch origin main
            git reset --soft origin/main
            git add docs/data.json
            git commit -m "chore: atualiza dados do Odoo ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            if git push origin HEAD:main; then
              echo "push OK na tentativa $tentativa"
              exit 0
            fi
            echo "push rejeitado (tentativa $tentativa), sincronizando e tentando de novo..."
            sleep 7
          done
          echo "Nao consegui empurrar apos varias tentativas."
          exit 1
