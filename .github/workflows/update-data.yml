name: Atualizar dados do Odoo

# Quando rodar:
on:
  schedule:
    - cron: "0 * * * *"      # a cada hora (UTC). Ajuste o intervalo se quiser.
  workflow_dispatch: {}       # botão para rodar manualmente na aba Actions
  push:
    branches: [ main ]        # roda também a cada push na main (útil no 1º teste)
    paths:
      - "scripts/**"
      - ".github/workflows/**"

permissions:
  contents: write             # necessário para commitar o data.json

concurrency:
  group: atualizar-dados
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Buscar dados no Odoo
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
        run: python scripts/fetch_odoo.py

      - name: Commitar data.json se mudou
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "Sem alterações nos dados."
          else
            git commit -m "chore: atualiza dados do Odoo ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git pull --rebase origin main
            git push
          fi
